name: build

on:
  workflow_dispatch:
    inputs:
      jcef_repo:
        description: "JCEF git repository to clone"
        required: true
        default: "https://github.com/trethore/jcef"
      jcef_ref:
        description: "JCEF git branch or commit"
        required: true
        default: "master"
      platform:
        description: "Target platform"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux-amd64
          - linux-arm64
          - macosx-amd64
          - macosx-arm64
          - windows-amd64
          - windows-arm64
      sign_macosx:
        description: "Sign macosx builds"
        type: boolean
        default: false
      dry_run:
        description: "Dry run (artifacts only, no release)"
        type: boolean
        default: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate patch tooling
        run: |
          python3 -m py_compile scripts/patches/*.py
          python3 -m unittest discover -s tests -v

  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          if [ "${{ inputs.dry_run }}" != "true" ] && [ "${{ inputs.platform }}" != "all" ]; then
            echo "Published releases require platform=all. Use dry_run=true for partial builds." >&2
            exit 1
          fi

          case "${{ inputs.platform }}" in
            all)
              matrix='{"include":[{"platform":"linux-amd64","os":"ubuntu-latest","runner":"linux","arch":"amd64","artifact":"linux-amd64.tar.gz"},{"platform":"linux-arm64","os":"ubuntu-24.04-arm","runner":"linux","arch":"arm64","artifact":"linux-arm64.tar.gz"},{"platform":"macosx-amd64","os":"macos-latest","runner":"macos","arch":"amd64","java_arch":"x64","artifact":"macosx-amd64.tar.gz"},{"platform":"macosx-arm64","os":"macos-latest","runner":"macos","arch":"arm64","java_arch":"aarch64","artifact":"macosx-arm64.tar.gz"},{"platform":"windows","os":"windows-2022","runner":"windows","arch":"all","docker_data_root":"D:\\docker-root"}]}'
              ;;
            linux-amd64)
              matrix='{"include":[{"platform":"linux-amd64","os":"ubuntu-latest","runner":"linux","arch":"amd64","artifact":"linux-amd64.tar.gz"}]}'
              ;;
            linux-arm64)
              matrix='{"include":[{"platform":"linux-arm64","os":"ubuntu-24.04-arm","runner":"linux","arch":"arm64","artifact":"linux-arm64.tar.gz"}]}'
              ;;
            macosx-amd64)
              matrix='{"include":[{"platform":"macosx-amd64","os":"macos-latest","runner":"macos","arch":"amd64","java_arch":"x64","artifact":"macosx-amd64.tar.gz"}]}'
              ;;
            macosx-arm64)
              matrix='{"include":[{"platform":"macosx-arm64","os":"macos-latest","runner":"macos","arch":"arm64","java_arch":"aarch64","artifact":"macosx-arm64.tar.gz"}]}'
              ;;
            windows-amd64)
              matrix='{"include":[{"platform":"windows-amd64","os":"windows-2022","runner":"windows","arch":"amd64","artifact":"windows-amd64.tar.gz"}]}'
              ;;
            windows-arm64)
              matrix='{"include":[{"platform":"windows-arm64","os":"windows-2022","runner":"windows","arch":"arm64","artifact":"windows-arm64.tar.gz","docker_data_root":"D:\\docker-root"}]}'
              ;;
            *)
              echo "Unknown platform input: ${{ inputs.platform }}"
              exit 1
              ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [set-matrix, validate]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: ${{ matrix.runner == 'linux' }}
        uses: docker/setup-buildx-action@v4

      - name: Setup environment
        if: ${{ matrix.runner == 'macos' }}
        run: |
          chmod +x scripts/setup/macos.sh
          ./scripts/setup/macos.sh
      - name: Set up Java
        if: ${{ matrix.runner == 'macos' }}
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "corretto"
          architecture: ${{ matrix.java_arch }}
      - name: Set up Python
        if: ${{ matrix.runner == 'macos' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install Apple certificate
        if: ${{ matrix.runner == 'macos' && inputs.sign_macosx }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_NAME: ${{ secrets.APPLE_API_KEY_NAME }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH -T /usr/bin/codesign
          security list-keychain -d user -s $KEYCHAIN_PATH
          mkdir "${HOME}/private_keys"
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode --output "${HOME}/private_keys/AuthKey_$APPLE_API_KEY_NAME.p8"

      - name: Build (linux)
        if: ${{ matrix.runner == 'linux' }}
        env:
          JCEF_BUILD_CACHE: gha
        run: |
          chmod +x scripts/build/linux.sh
          ./scripts/build/linux.sh ${{ matrix.arch }} Release ${{ inputs.jcef_repo }} ${{ inputs.jcef_ref }}
      - name: Build (macos signed)
        if: ${{ matrix.runner == 'macos' && inputs.sign_macosx }}
        run: |
          chmod +x scripts/build/macos.sh
          ./scripts/build/macos.sh ${{ matrix.arch }} Release ${{ inputs.jcef_repo }} ${{ inputs.jcef_ref }} "${{ secrets.APPLE_BUILD_CERTIFICATE_NAME }}" ${{ secrets.APPLE_API_KEY_ID }} "${HOME}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_NAME }}.p8" ${{ secrets.APPLE_API_KEY_ISSUER }}
      - name: Build (macos unsigned)
        if: ${{ matrix.runner == 'macos' && !inputs.sign_macosx }}
        run: |
          chmod +x scripts/build/macos.sh
          ./scripts/build/macos.sh ${{ matrix.arch }} Release ${{ inputs.jcef_repo }} ${{ inputs.jcef_ref }}
      - name: Clean up keychain
        if: ${{ matrix.runner == 'macos' && inputs.sign_macosx && always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          rm -rf "${HOME}/private_keys"
      - name: Build (windows)
        if: ${{ matrix.runner == 'windows' }}
        shell: cmd
        env:
          JCEF_DOCKER_DATA_ROOT: ${{ matrix.docker_data_root }}
        run: |
          if "${{ matrix.arch }}"=="all" (
            scripts\build\windows_all.bat Release ${{ inputs.jcef_repo }} ${{ inputs.jcef_ref }}
          ) else (
            scripts\build\windows.bat ${{ matrix.arch }} Release ${{ inputs.jcef_repo }} ${{ inputs.jcef_ref }}
          )

      - name: Prepare artifact (unix)
        if: ${{ matrix.runner != 'windows' }}
        run: |
          mkdir -p out/release-assets
          cp out/binary_distrib.tar.gz out/release-assets/${{ matrix.artifact }}
          if [ "${{ matrix.platform }}" = "macosx-amd64" ] && [ -f out/javadoc.tar.gz ]; then
            cp out/javadoc.tar.gz out/release-assets/javadoc.tar.gz
          fi
      - name: Prepare artifact (windows)
        if: ${{ matrix.runner == 'windows' }}
        shell: cmd
        run: |
          mkdir out\release-assets
          if "${{ matrix.arch }}"=="all" (
            copy out\windows-amd64\binary_distrib.tar.gz out\release-assets\windows-amd64.tar.gz
            copy out\windows-arm64\binary_distrib.tar.gz out\release-assets\windows-arm64.tar.gz
          ) else (
            copy out\binary_distrib.tar.gz out\release-assets\${{ matrix.artifact }}
          )
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.platform }}
          path: out/release-assets

  publish-release:
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Validate release assets
        run: |
          expected=(
            linux-amd64.tar.gz
            linux-arm64.tar.gz
            macosx-amd64.tar.gz
            macosx-arm64.tar.gz
            windows-amd64.tar.gz
            windows-arm64.tar.gz
            javadoc.tar.gz
          )
          for artifact in "${expected[@]}"; do
            if [ ! -s "release-assets/${artifact}" ]; then
              echo "Missing or empty release artifact: ${artifact}" >&2
              exit 1
            fi
          done
      - name: Generate release info
        env:
          JCEF_REPO: ${{ inputs.jcef_repo }}
          JCEF_REF: ${{ inputs.jcef_ref }}
          ACTIONS_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTIONS_RUN_NUMBER: ${{ github.run_number }}
          RELEASE_REPO: ${{ github.repository }}
        run: |
          cd scripts/release
          chmod +x create_release_info.sh
          ./create_release_info.sh "$JCEF_REPO" "$JCEF_REF" "$ACTIONS_URL" "$ACTIONS_RUN_NUMBER" "$RELEASE_REPO"
      - name: Create draft release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.release_tag_name }}" \
            --draft \
            --title "${{ env.release_name }}" \
            --notes-file scripts/release/release_message.md
          touch release-created
          gh release upload "${{ env.release_tag_name }}" \
            release-assets/* \
            scripts/release/LICENSE \
            scripts/release/build_meta.json
      - name: Publish completed release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ env.release_tag_name }}" --draft=false
      - name: Remove incomplete draft on failure
        if: ${{ failure() && env.release_tag_name != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f release-created ]; then
            gh release delete "${{ env.release_tag_name }}" --yes --cleanup-tag || true
          fi
